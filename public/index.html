<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title data-i18n="title">서로마음</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8622280233702760" crossorigin="anonymous"></script>
<script async src="https://fundingchoicesmessages.google.com/i/pub-8622280233702760?ers=1" nonce="x"></script><script nonce="x">(function(){function signalGooglefcPresent(){if(!window.frames.googlefcPresent){if(document.body){const f=document.createElement('iframe');f.style.display='none';f.style.width=0;f.style.height=0;f.style.border=0;f.src='https://fundingchoicesmessages.google.com/i/pub-8622280233702760?ers=2';document.body.appendChild(f)}else{setTimeout(signalGooglefcPresent,0)}}}signalGooglefcPresent()})();</script>
<style>
:root { --bg:#f6f8f4; --text:#2c332c; --sub:#788a76; --pri:#6b8f71; --pri2:#8fae91; --b-user:#edf2ea; --b-ai:#fff; --border:#dce5d9; --radius:18px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; justify-content:center; align-items:center; }
.app { width:100%; max-width:480px; height:100dvh; background:#fff; display:flex; flex-direction:column; position:relative; overflow:hidden; }
.header { padding:16px 20px 12px; border-bottom:1px solid var(--border); text-align:center; }
.header h1 { font-size:20px; font-weight:600; color:var(--pri); }
.header p { font-size:12px; color:var(--sub); margin-top:2px; }
.test-banner { background:#fff3cd; color:#856404; text-align:center; padding:6px; font-size:12px; font-weight:500; }
.ad-banner { min-height:50px; margin:8px 16px; background:var(--bg); border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.screen { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.screen { padding:24px; justify-content:center; gap:14px; }
.screen h2 { font-size:18px; font-weight:500; text-align:center; }
.btn { width:100%; padding:16px; border:2px solid var(--border); border-radius:var(--radius); background:#fff; font-size:15px; cursor:pointer; text-align:left; transition:all .2s; }
.btn:hover { border-color:var(--pri); background:#e8ecf1; }
.btn .label { font-weight:600; }
.btn .desc { font-size:13px; color:var(--sub); margin-top:4px; }
.btn.sel { border-color:var(--pri); background:#e8ecf1; }
.btn:hover { border-color:var(--pri); background:#eaf2e8; }
.btn.sel { border-color:var(--pri); background:#eaf2e8; }
.tag:hover { border-color:var(--pri); }
.tag.sel { border-color:var(--pri); background:var(--pri); color:#fff; }
.tag-row { display:flex; flex-wrap:wrap; gap:8px; }
.tag { padding:10px 16px; border:2px solid var(--border); border-radius:24px; font-size:14px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.hidden { display:none !important; }
.messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.bubble { max-width:85%; padding:14px 16px; border-radius:var(--radius); font-size:14px; line-height:1.6; word-break:break-word; animation:fadeIn .3s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.bubble.user { align-self:flex-end; background:var(--b-user); border-bottom-right-radius:6px; }
.bubble.assistant { align-self:flex-start; background:var(--b-ai); border:1px solid var(--border); border-bottom-left-radius:6px; }
.bubble h3 { font-size:15px; margin:12px 0 6px; color:var(--pri); }
.bubble h3:first-child { margin-top:0; }
.bubble ul { margin:6px 0; padding-left:20px; }
.bubble li { margin:3px 0; }
.typing-indicator { align-self:flex-start; display:flex; gap:4px; padding:14px 16px; background:var(--b-ai); border:1px solid var(--border); border-radius:var(--radius); border-bottom-left-radius:6px; }
.typing-indicator span { width:7px; height:7px; border-radius:50%; background:var(--sub); animation: bounce 1.4s infinite both; }
.typing-indicator span:nth-child(2) { animation-delay:0.2s; }
.typing-indicator span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100% { transform:scale(0.5); opacity:0.4; } 40% { transform:scale(1); opacity:1; } }
.input-area { padding:12px 16px 20px; border-top:1px solid var(--border); display:flex; gap:8px; }
.input-area input { flex:1; padding:12px 16px; border:1px solid var(--border); border-radius:24px; font-size:14px; outline:none; background:var(--bg); }
.input-area input:focus { border-color:var(--pri); }
.input-area button { width:44px; height:44px; border-radius:50%; border:none; background:var(--pri); color:#fff; font-size:18px; cursor:pointer; flex-shrink:0; }
.input-area button:disabled { opacity:.4; }
.privacy-note { text-align:center; padding:12px; color:var(--sub); font-size:11px; }
.scroll-btn { position:absolute; bottom:72px; right:20px; width:36px; height:36px; border-radius:50%; background:var(--pri); color:#fff; border:none; font-size:18px; cursor:pointer; display:none; box-shadow:0 2px 8px rgba(0,0,0,0.15); z-index:10; }
.disclaimer { text-align:center; padding:8px 16px; font-size:10px; color:var(--sub); line-height:1.5; border-top:1px solid var(--border); }
.input-row { display:flex; gap:8px; align-items:center; }
.input-row input { flex:1; padding:12px 16px; border:2px solid var(--border); border-radius:24px; font-size:15px; outline:none; }
.input-row input:focus { border-color:var(--pri); }
</style>
</head>
<body>
<div class="app">
  <div class="test-banner" data-i18n="testBanner">⚠️ 현재 테스트 중인 사이트입니다</div>
  <div class="header"><h1 data-i18n="title">서로마음</h1><p data-i18n="subtitle">부모와 아이, 서로의 마음을 보다</p></div>

  <!-- Screen 1: Role -->
  <div class="screen" id="screenRole">
    <div class="privacy-note" data-i18n="privacy">비공개 · 안전한 상담</div>
    <h2 data-i18n="roleTitle">누구의 고민인가요?</h2>
    <button class="btn" onclick="setRole('parent')"><div class="label" data-i18n="roleParent">👨‍👩‍👧 부모로서 아이가 고민이에요</div><div class="desc" data-i18n="roleParentDesc">아이의 행동, 관계에 대한 조언</div></button>
    <button class="btn" onclick="setRole('child')"><div class="label" data-i18n="roleChild">🧒 자녀로서 부모님이 고민이에요</div><div class="desc" data-i18n="roleChildDesc">부모님과의 갈등, 소통 방법</div></button>
  </div>

  <!-- Screen 2: Profile (optional) -->
  <div class="screen hidden" id="screenProfile">
    <button onclick="goBack()" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;color:var(--sub);padding:6px 12px;">← 뒤로</button>
    <h2 style="font-size:18px;font-weight:500;margin-top:4px;">조금만 더 알려주세요 <span style="color:var(--sub);font-size:13px;">(선택)</span></h2>
    <p style="color:var(--sub);font-size:13px;text-align:center;">더 정확한 맞춤 조언을 드릴 수 있어요</p>
    <div class="input-row"><input id="profAge" placeholder="아이(또는 본인)의 나이 (예: 9살)" type="text"></div>
    <p style="font-size:13px;color:var(--sub);margin-top:8px;" id="genderLabel">성별</p>
    <div class="tag-row" id="tagGender"></div>
    <p style="font-size:13px;color:var(--sub);margin-top:8px;" id="temperLabel">성향은 어떤가요?</p>
    <div class="tag-row" id="tagTemperament"></div>
    <button class="btn" onclick="startChat()" style="text-align:center;margin-top:8px;background:var(--pri);color:#fff;border-color:var(--pri);">맞춤 상담 시작하기</button>
    <p class="privacy-note">모든 정보는 기기에만 저장됩니다</p>
  </div>

  <!-- Screen 3: Chat -->
  <div class="screen hidden" id="screenChat" style="padding:0;gap:0;">
    <div style="display:flex;align-items:center;padding:8px 16px;gap:8px;border-bottom:1px solid var(--border);">
      <button onclick="newChat()" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;color:var(--sub);padding:5px 10px;">+ 새 상담</button>
      <span style="font-size:12px;color:var(--sub);">대화 내용은 저장되지 않습니다</span>
    </div>
    <div class="ad-banner ad-top"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8622280233702760" data-ad-slot="1111111111" data-ad-format="auto" data-full-width-responsive="true"></ins></div>
    <div class="messages" id="messages"></div>
    <div class="input-area" id="inputArea">
      <input id="userInput" data-i18n="placeholder" placeholder="메시지를 입력하세요…" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()" id="sendBtn">↑</button>
    </div>
    <div class="disclaimer" data-i18n="disclaimerChat">AI 상담사가 실수할 수 있습니다. 참고용으로만 활용하세요.</div>
    <div style="text-align:center;padding:4px 16px 8px;font-size:9px;color:var(--sub);">© 2026 다른맘. 문의: counterpencil@gmail.com</div>
  </div>
  <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">↓</button>
</div>

<script>
const API = 'https://seoromaeum.counterpencil.workers.dev/chat';
let speaker = '', profile = {}, msgHistory = [], streamingBubble = null, autoScroll = true;
const msgEl = document.getElementById('messages');

// Temperament tags
const temperamentKO = ['예민해요','산만해요','내성적이에요','활발해요','고집이 세요','차분해요','감정기복이 커요'];
const temperamentEN = ['Sensitive','Distractible','Introverted','Energetic','Stubborn','Calm','Mood swings'];
const lang = (navigator.language||'ko').split('-')[0];
const isKO = lang === 'ko';
const temperaments = isKO ? temperamentKO : temperamentEN;

// Init temperament tags
const tagRow = document.getElementById('tagTemperament');
temperaments.forEach((t, i) => {
  const tag = document.createElement('span');
  tag.className = 'tag'; tag.textContent = t;
  tag.onclick = () => {
    tag.classList.toggle('sel');
    profile.temperament = profile.temperament || [];
    if (tag.classList.contains('sel')) profile.temperament.push(isKO ? temperamentKO[i] : temperamentEN[i]);
    else profile.temperament = profile.temperament.filter(x => x !== (isKO ? temperamentKO[i] : temperamentEN[i]));
  };
  tagRow.appendChild(tag);
});

// i18n
const i18n = {
  ko: { title:'다른맘', subtitle:'다른 마음을 이해하는 공간',testBanner:'⚠️ 현재 테스트 중인 사이트입니다', privacy:'비공개 · 안전한 상담', roleTitle:'누구의 고민인가요?', roleParent:'부모로서 아이가 고민이에요', roleParentDesc:'아이의 행동, 관계에 대한 조언', roleChild:'자녀로서 부모님이 고민이에요', roleChildDesc:'부모님과의 갈등, 소통 방법', parentPrompt:'아이의 어떤 점이 고민이신가요?', childPrompt:'부모님과 어떤 일로 힘드신가요?', placeholder:'메시지를 입력하세요…', disclaimerChat:'AI 상담사가 실수할 수 있습니다. 참고용으로만 활용하세요.', error:'오류가 발생했습니다.' },
  en: { title:'DaleunMom', subtitle:'Understanding Different Hearts', testBanner:'⚠️ Test site', privacy:'Private · Secure', roleTitle:'Whose concern?', roleParent:'I\'m a parent', roleParentDesc:'Worried about my child', roleChild:'I\'m a child', roleChildDesc:'Worried about my parent', parentPrompt:'What concerns you?', childPrompt:'What\'s troubling you?', placeholder:'Type a message…', disclaimerChat:'AI can make mistakes.', error:'An error occurred.' },
};
function t(k) { return (i18n[isKO?'ko':'en']||i18n.en)[k]||k; }
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(e=>{const k=e.getAttribute('data-i18n');if(e.tagName==='INPUT')e.placeholder=t(k);else e.textContent=t(k)});document.title=t('title');}
window.addEventListener('DOMContentLoaded', applyI18n);

msgEl.addEventListener('scroll',()=>{const atBot=msgEl.scrollHeight-msgEl.scrollTop-msgEl.clientHeight<60;autoScroll=atBot;document.getElementById('scrollBtn').style.display=atBot?'none':'block';});
function scrollToBottom(){autoScroll=true;msgEl.scrollTop=msgEl.scrollHeight;document.getElementById('scrollBtn').style.display='none';}

function setRole(role) {
  speaker = role;
  document.getElementById('screenRole').classList.add('hidden');
  document.getElementById('screenProfile').classList.remove('hidden');
  
  // Update placeholders based on role
  const ageInput = document.getElementById('profAge');
  const genderLabel = document.getElementById('genderLabel');
  const temperLabel = document.getElementById('temperLabel');
  
  if (role === 'parent') {
    ageInput.placeholder = "아이의 나이 (예: 9살)";
    genderLabel.textContent = '아이의 성별';
    temperLabel.textContent = '아이의 성향은 어떤가요?';
  } else {
    ageInput.placeholder = "본인의 나이 (예: 15살)";
    genderLabel.textContent = '부모님의 성별';
    temperLabel.textContent = '본인의 성향은 어떤가요?';
  }
  
  // Update gender tags
  const genderRow = document.getElementById('tagGender');
  genderRow.innerHTML = '';
  const genders = role === 'parent' 
    ? (isKO ? ['아들','딸'] : ['Son','Daughter'])
    : (isKO ? ['아버지','어머니'] : ['Father','Mother']);
  genders.forEach(g => {
    const tag = document.createElement('span');
    tag.className = 'tag'; tag.textContent = g;
    tag.onclick = () => {
      genderRow.querySelectorAll('.tag').forEach(t => t.classList.remove('sel'));
      tag.classList.add('sel');
      profile.gender = g;
    };
    genderRow.appendChild(tag);
  });
}

function goBack() {
  document.getElementById('screenProfile').classList.add('hidden');
  document.getElementById('screenRole').classList.remove('hidden');
  profile = {};
}

function newChat() {
  msgHistory = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('screenChat').classList.add('hidden');
  document.getElementById('screenRole').classList.remove('hidden');
  profile = {};
}

function startChat() {
  profile.age = document.getElementById('profAge').value.trim();
  goToChat();
}

function goToChat() {
  document.getElementById('screenProfile').classList.add('hidden');
  document.getElementById('screenChat').classList.remove('hidden');
  const prompt = speaker === 'parent' ? t('parentPrompt') : t('childPrompt');
  addBubble('assistant', prompt);
  document.getElementById('userInput').focus();
}

function addBubble(role, text) {
  const d=document.createElement('div'); d.className='bubble '+role; d.innerHTML=md2html(text);
  msgEl.appendChild(d); if(autoScroll)msgEl.scrollTop=msgEl.scrollHeight; return d;
}
function md2html(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');}
function showTyping(){const d=document.createElement('div');d.className='typing-indicator';d.id='typingDots';d.innerHTML='<span></span><span></span><span></span>';msgEl.appendChild(d);if(autoScroll)msgEl.scrollTop=msgEl.scrollHeight;}
function hideTyping(){const e=document.getElementById('typingDots');if(e)e.remove();}

async function send() {
  const input=document.getElementById('userInput'), text=input.value.trim();
  if(!text)return; input.value=''; document.getElementById('sendBtn').disabled=true;
  addBubble('user',text); msgHistory.push({role:'user',content:text});
  showTyping(); streamingBubble=document.createElement('div'); streamingBubble.className='bubble assistant'; msgEl.appendChild(streamingBubble);
  let fullText='';
  try {
    const resp=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({speaker,profile,messages:msgHistory})});
    const reader=resp.body.getReader(),dec=new TextDecoder(); let buf='';
    while(true){const{done,value}=await reader.read();if(done){if(buf.trim()){const l=buf.trim();if(l.startsWith('data: '))try{fullText+=JSON.parse(l.slice(6)).choices?.[0]?.delta?.content||'';}catch{}}break;}buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';for(const l of lines){if(!l.startsWith('data: '))continue;if(l==='data: [DONE]')continue;try{fullText+=JSON.parse(l.slice(6)).choices?.[0]?.delta?.content||'';}catch{}}hideTyping();streamingBubble.innerHTML=md2html(fullText);if(autoScroll)msgEl.scrollTop=msgEl.scrollHeight;else document.getElementById('scrollBtn').style.display='block';}
    streamingBubble.innerHTML=md2html(fullText); msgHistory.push({role:'assistant',content:fullText});
  }catch(e){hideTyping();streamingBubble.innerHTML=t('error');}
  streamingBubble=null; document.getElementById('sendBtn').disabled=false; input.focus();
}
</script>
</body>
</html>
