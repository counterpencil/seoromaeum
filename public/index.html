<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>서로마음</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8622280233702760" crossorigin="anonymous"></script>
<script async src="https://fundingchoicesmessages.google.com/i/pub-8622280233702760?ers=1" nonce="x"></script><script nonce="x">(function(){function signalGooglefcPresent(){if(!window.frames.googlefcPresent){if(document.body){const f=document.createElement('iframe');f.style.display='none';f.style.width=0;f.style.height=0;f.style.border=0;f.src='https://fundingchoicesmessages.google.com/i/pub-8622280233702760?ers=2';document.body.appendChild(f)}else{setTimeout(signalGooglefcPresent,0)}}}signalGooglefcPresent()})();</script>
<style>
:root { --bg:#faf8f5; --text:#2c2c2c; --sub:#8c8c8c; --pri:#5b6e8a; --b-user:#f0ebe3; --b-ai:#fff; --border:#e8e4df; --radius:18px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; justify-content:center; align-items:center; }
.app { width:100%; max-width:480px; height:100dvh; background:#fff; display:flex; flex-direction:column; position:relative; }
.header { padding:16px 20px 12px; border-bottom:1px solid var(--border); text-align:center; }
.header h1 { font-size:20px; font-weight:600; color:var(--pri); }
.header p { font-size:12px; color:var(--sub); margin-top:2px; }
.test-banner { background:#fff3cd; color:#856404; text-align:center; padding:6px; font-size:12px; font-weight:500; }
.ad-banner { min-height:50px; margin:8px 16px; background:var(--bg); border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.ad-top { margin-top:0; }
.role-screen, .chat-screen { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.role-screen { padding:24px; justify-content:center; gap:20px; }
.role-screen h2 { font-size:18px; font-weight:500; text-align:center; }
.role-btn { width:100%; padding:18px; border:2px solid var(--border); border-radius:var(--radius); background:#fff; font-size:15px; cursor:pointer; text-align:left; transition:all .2s; }
.role-btn:hover { border-color:var(--pri); background:#e8ecf1; }
.role-btn .label { font-weight:600; }
.role-btn .desc { font-size:13px; color:var(--sub); margin-top:4px; }
.hidden { display:none !important; }
.messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.bubble { max-width:85%; padding:14px 16px; border-radius:var(--radius); font-size:14px; line-height:1.6; word-break:break-word; animation:fadeIn .3s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.bubble.user { align-self:flex-end; background:var(--b-user); border-bottom-right-radius:6px; }
.bubble.assistant { align-self:flex-start; background:var(--b-ai); border:1px solid var(--border); border-bottom-left-radius:6px; }
.bubble h3 { font-size:15px; margin:12px 0 6px; color:var(--pri); }
.bubble h3:first-child { margin-top:0; }
.bubble ul { margin:6px 0; padding-left:20px; }
.bubble li { margin:3px 0; }

/* typing dots */
.typing-indicator { align-self:flex-start; display:flex; gap:4px; padding:14px 16px; background:var(--b-ai); border:1px solid var(--border); border-radius:var(--radius); border-bottom-left-radius:6px; }
.typing-indicator span { width:7px; height:7px; border-radius:50%; background:var(--sub); animation: bounce 1.4s infinite both; }
.typing-indicator span:nth-child(2) { animation-delay:0.2s; }
.typing-indicator span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,80%,100% { transform:scale(0.5); opacity:0.4; } 40% { transform:scale(1); opacity:1; } }

.input-area { padding:12px 16px 20px; border-top:1px solid var(--border); display:flex; gap:8px; }
.input-area input { flex:1; padding:12px 16px; border:1px solid var(--border); border-radius:24px; font-size:14px; outline:none; background:var(--bg); }
.input-area input:focus { border-color:var(--pri); }
.input-area button { width:44px; height:44px; border-radius:50%; border:none; background:var(--pri); color:#fff; font-size:18px; cursor:pointer; flex-shrink:0; }
.input-area button:disabled { opacity:.4; }
.done-banner { text-align:center; padding:16px; color:var(--sub); font-size:13px; }
.privacy-note { text-align:center; padding:12px; color:var(--sub); font-size:11px; }
.scroll-btn { position:absolute; bottom:80px; right:20px; width:40px; height:40px; border-radius:50%; background:var(--pri); color:#fff; border:none; font-size:20px; cursor:pointer; display:none; box-shadow:0 2px 8px rgba(0,0,0,0.15); z-index:10; }
.disclaimer { text-align:center; padding:8px 16px; font-size:10px; color:var(--sub); line-height:1.5; border-top:1px solid var(--border); }
</style>
</head>
<body>
<div class="app">
  <div class="test-banner" data-i18n="testBanner">⚠️ 현재 테스트 중인 사이트입니다</div>
  <div class="header"><h1 data-i18n="title">서로마음</h1><p data-i18n="subtitle">부모와 아이, 서로의 마음을 보다</p></div>

  <div class="role-screen" id="roleScreen">
    <div class="privacy-note" data-i18n="privacy">비공개 · 안전한 상담</div>
    <h2 data-i18n="roleTitle">누구의 고민인가요?</h2>
    <button class="role-btn" onclick="start('parent')"><div class="label" data-i18n="roleParent">👨‍👩‍👧 부모로서 아이가 고민이에요</div><div class="desc" data-i18n="roleParentDesc">아이의 행동, 관계에 대한 조언</div></button>
    <button class="role-btn" onclick="start('child')"><div class="label" data-i18n="roleChild">🧒 자녀로서 부모님이 고민이에요</div><div class="desc" data-i18n="roleChildDesc">부모님과의 갈등, 소통 방법</div></button>
    <div class="disclaimer"><span data-i18n="disclaimer1">⚠️ AI가 생성한 답변은 참고용이며, 전문 심리상담을 대체하지 않습니다.</span><br><span data-i18n="disclaimer2">심각한 상황이라면 반드시 전문가와 상담하세요.</span></div>
  </div>

  <div class="chat-screen hidden" id="chatScreen">
    <div class="ad-banner ad-top"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8622280233702760" data-ad-slot="1111111111" data-ad-format="auto" data-full-width-responsive="true"></ins></div>
    <div class="messages" id="messages"></div>
    <div class="input-area" id="inputArea">
      <input id="userInput" data-i18n="placeholder" placeholder="메시지를 입력하세요…" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()" id="sendBtn">↑</button>
    </div>
    <div class="disclaimer" data-i18n="disclaimerChat">AI 상담사가 실수할 수 있습니다. 참고용으로만 활용하세요.</div>
  </div>
  <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">↓</button>
</div>

<script>
const API = 'https://seoromaeum.counterpencil.workers.dev/chat';
let speaker = '', msgHistory = [], streamingBubble = null, autoScroll = true;
const msgEl = document.getElementById('messages');

// ── i18n ────────────────────────────────────────────
const i18n = {
  ko: {
    title: '서로마음', subtitle: '부모와 아이, 서로의 마음을 보다',
    testBanner: '⚠️ 현재 테스트 중인 사이트입니다',
    privacy: '비공개 · 안전한 상담',
    roleTitle: '누구의 고민인가요?',
    roleParent: '부모로서 아이가 고민이에요',
    roleParentDesc: '아이의 행동, 관계에 대한 조언',
    roleChild: '자녀로서 부모님이 고민이에요',
    roleChildDesc: '부모님과의 갈등, 소통 방법',
    parentPrompt: '아이의 어떤 점이 고민이신가요? 편하게 말씀해주세요.',
    childPrompt: '부모님과 어떤 일로 힘드신가요? 편하게 말씀해주세요.',
    placeholder: '메시지를 입력하세요…',
    disclaimer1: '⚠️ AI가 생성한 답변은 참고용이며, 전문 심리상담을 대체하지 않습니다.',
    disclaimer2: '심각한 상황이라면 반드시 전문가와 상담하세요.',
    disclaimerChat: 'AI 상담사가 실수할 수 있습니다. 참고용으로만 활용하세요.',
    doneBanner: '상담이 완료되었습니다. 새로고침 후 다시 이용해주세요.',
    error: '오류가 발생했습니다. 다시 시도해주세요.',
  },
  en: {
    title: 'Seoromaeum', subtitle: 'Parent and child, seeing each other\'s hearts',
    testBanner: '⚠️ Test site — under development',
    privacy: 'Private · Secure counseling',
    roleTitle: 'Whose concern is it?',
    roleParent: 'I\'m a parent worried about my child',
    roleParentDesc: 'Advice on child behavior and relationships',
    roleChild: 'I\'m a child worried about my parent',
    roleChildDesc: 'Help with parent conflict and communication',
    parentPrompt: 'What concerns you about your child? Feel free to share.',
    childPrompt: 'What\'s troubling you about your parent? Feel free to share.',
    placeholder: 'Type a message…',
    disclaimer1: '⚠️ AI-generated responses are for reference only and do not replace professional counseling.',
    disclaimer2: 'If the situation is serious, please consult a professional.',
    disclaimerChat: 'AI can make mistakes. Use for reference only.',
    doneBanner: 'Session complete. Refresh to start a new session.',
    error: 'An error occurred. Please try again.',
  },
};

function t(key) {
  const lang = (navigator.language || 'ko').split('-')[0];
  const dict = i18n[lang] || i18n.en;
  return dict[key] || i18n.en[key] || key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT') el.placeholder = t(key);
    else el.textContent = t(key);
  });
}
window.addEventListener('DOMContentLoaded', applyI18n);

msgEl.addEventListener('scroll', () => {
  const atBot = msgEl.scrollHeight - msgEl.scrollTop - msgEl.clientHeight < 60;
  autoScroll = atBot;
  document.getElementById('scrollBtn').style.display = atBot ? 'none' : 'block';
});

function scrollToBottom() {
  autoScroll = true;
  msgEl.scrollTop = msgEl.scrollHeight;
  document.getElementById('scrollBtn').style.display = 'none';
}

// AdSense init
function initAds() {
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch {}
}

function start(role) {
  speaker = role;
  document.getElementById('roleScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');
  addBubble('assistant', role === 'parent' ? t('parentPrompt') : t('childPrompt'));
  document.getElementById('userInput').focus();
  setTimeout(initAds, 100);
}

function addBubble(role, text) {
  const d = document.createElement('div');
  d.className = 'bubble ' + role;
  d.innerHTML = md2html(text);
  msgEl.appendChild(d);
  if (autoScroll) msgEl.scrollTop = msgEl.scrollHeight;
  return d;
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'typing-indicator';
  d.id = 'typingDots';
  d.innerHTML = '<span></span><span></span><span></span>';
  msgEl.appendChild(d);
  if (autoScroll) msgEl.scrollTop = msgEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingDots');
  if (el) el.remove();
}

function md2html(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

async function send() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.disabled = true;
  document.getElementById('sendBtn').disabled = true;
  addBubble('user', text);
  msgHistory.push({ role: 'user', content: text });

  showTyping();
  streamingBubble = document.createElement('div');
  streamingBubble.className = 'bubble assistant';
  msgEl.appendChild(streamingBubble);
  let fullText = '';

  try {
    const resp = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({speaker,messages:msgHistory}) });
    const reader = resp.body.getReader(), dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop()||'';
      for (const l of lines) {
        if (!l.startsWith('data: ')) continue;
        if (l === 'data: [DONE]') continue;
        try { fullText += JSON.parse(l.slice(6)).choices?.[0]?.delta?.content||''; } catch {}
      }
      hideTyping();
      streamingBubble.innerHTML = md2html(fullText);
      if (autoScroll) msgEl.scrollTop = msgEl.scrollHeight;
      else document.getElementById('scrollBtn').style.display = 'block';
    }
    streamingBubble.innerHTML = md2html(fullText);
    msgHistory.push({ role: 'assistant', content: fullText });
  } catch(e) {
    hideTyping();
    streamingBubble.innerHTML = '오류가 발생했습니다. 다시 시도해주세요.';
  }

  streamingBubble = null;
  input.disabled = false; document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
